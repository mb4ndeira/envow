name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: envow_linux_amd64_v1
            ext: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: envow_linux_arm64
            ext: ""
            cross: true
          - os: ubuntu-latest
            target: x86_64-pc-windows-gnu
            artifact: envow_windows_amd64_v1
            ext: ".exe"
            mingw: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: envow_darwin_amd64
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: envow_darwin_arm64
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: ${{ matrix.cross }}
        uses: taiki-e/install-action@cross

      - name: Install mingw-w64
        if: ${{ matrix.mingw }}
        run: sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp target/${{ matrix.target }}/release/envow${{ matrix.ext }} \
             dist/${{ matrix.artifact }}/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}/

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: dist/

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean --skip=build,validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
